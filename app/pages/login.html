<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
    <script src="login.js" defer></script>
</head>
<body>
<main>
    <div class="form-container">

        <div class="izquierda">

            <div class="encabezado">
                <img src="img/logo.png" class="logo_login">
                <h1>JCasas</h1>
                <p>Ingresa para pedir tus platos favoritos</p>
            </div>

            <div class="botones">
                <button>Iniciar sesión</button>
                <form action="/register" method="GET">
                    <button type="submit">Registrarse</button>
                </form>
            </div>

            <form id="login-form">

                <label for="correo">Correo electrónico</label>
                <input type="email" name="correo" id="correo" placeholder="EJ: jm4466408@gmail.com">

                <label for="contrasena">Contraseña</label>
                <input type="password" name="contrasena" id="contrasena" placeholder="Contraseña de usuario">

                <div class="olv_contra">
                    <p>Olvidé la contraseña</p>
                </div>

                <button type="submit">Ingresar</button>
            </form>

            <div id="mensaje-exito" style="display:none; color:green; text-align:center;">
                ✅ Usuario registrado con éxito. Ya puedes iniciar sesión.
            </div>

        </div>

        <div class="derecha">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f8/Aculco_Restaurante_T%C3%ADpico.jpg" alt="Restaurante">
        </div>

    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('registro') === 'exitoso') {
        document.getElementById('mensaje-exito').style.display = 'block';
    }
</script>

</body>
</html>
