<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link rel="stylesheet" href="style.css" />
    <script src="register.js" defer></script>
  </head>
  <body>
    <main>
      <div class="form-container">
        <div class="izquierda">
          <div class="encabezado">
            <img src="img/logo.png" class="logo_register" />
            <h1>JCasas</h1>
            <p>Ingresa para pedir tus platos favoritos</p>
          </div>

          <div class="botones">
            <form action="/" method="GET">
              <button type="submit">Iniciar sesión</button>
            </form>
            <button>Registrarse</button>
          </div>

          <form id="register-form">
            <label for="correo">Correo electrónico</label>
            <input
              type="email"
              name="correo"
              id="correo"
              placeholder="EJ: jm4466408@gmail.com"
            />

            <label for="nombre">Nombre de usuario</label>
            <input
              type="text"
              name="nombre"
              id="nombre"
              placeholder="Nombre de usuario"
            />

            <label for="telefono">Teléfono</label>
            <input
              type="text"
              name="telefono"
              id="telefono"
              placeholder="EJ: 3209162021"
            />

            <label for="contrasena">Contraseña</label>
            <input
              type="password"
              name="contrasena"
              id="contrasena"
              placeholder="Contraseña de usuario"
            />

            <div class="permisos">
              <input type="checkbox" />
              <span>Acepta términos y condiciones</span>
            </div>

            <button type="submit">Registrarse</button>
          </form>
        </div>

        <div class="derecha">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/f/f8/Aculco_Restaurante_T%C3%ADpico.jpg"
            alt="Restaurante"
          />
        </div>
      </div>
    </main>
  </body>
</html>
